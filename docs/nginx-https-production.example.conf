# 生产环境：HTTPS 站点（适用于香港或其它地区服务器 + Let’s Encrypt / 云厂商证书）
# 用法：复制为 /etc/nginx/sites-available/forestry.conf，修改 server_name、证书路径、root 路径后启用。
# 前端与 API 同源：浏览器只访问 https://你的域名/ ，接口走 /api/ 由 Nginx 反代到本机 Flask。

# HTTP 跳转 HTTPS（证书就绪后启用本 server，并保留或合并下方 443 块）
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example.hk www.your-domain.example.hk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.example.hk www.your-domain.example.hk;

    # Let’s Encrypt 示例路径（certbot --nginx 会自动写入类似配置）
    ssl_certificate     /etc/letsencrypt/live/your-domain.example.hk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example.hk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 识图 Base64 请求体较大，必须大于默认 1m
    client_max_body_size 20m;

    root /opt/forestry-toolbox-v2/frontend/dist;
    index index.html;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
